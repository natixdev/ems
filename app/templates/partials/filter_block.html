<section class="filters-card" aria-label="Фильтры работников">
  <form class="filters-form" method="get" action="{{ url_for('employees_roster') }}">
    <input type="hidden" name="page" value="1">

    <div class="filters-line">
      <input
        type="text"
        class="filter-input"
        name="last_name"
        placeholder="Фамилия"
        value="{{ request.query_params.get('last_name', '') }}"
      >

      <input
        type="text"
        class="filter-input"
        name="first_name"
        placeholder="Имя"
        value="{{ request.query_params.get('first_name', '') }}"
      >

      <input
        type="text"
        class="filter-input"
        name="middle_name"
        placeholder="Отчество"
        value="{{ request.query_params.get('middle_name', '') }}"
      >

      <input
        type="number"
        class="filter-input filter-input--narrow"
        name="age"
        placeholder="Возраст"
        value="{{ request.query_params.get('age', '') }}"
      >

      <input
        type="tel"
        class="filter-input filter-input--wide"
        name="phone_number"
        placeholder="Телефон"
        value="{{ request.query_params.get('phone_number', '') }}"
      >

      <div class="filters-actions">
        <button class="btn btn--primary btn--sm" type="submit">Поиск</button>
        <a class="btn btn--secondary btn--sm" href="{{ url_for('employees_roster') }}">Сбросить</a>
      </div>
    </div>

    <div class="page-size">
      <label for="size">Показывать:</label>
      <select id="size" name="size" onchange="this.form.submit()">
        <option value="10" {% if size == 10 %}selected{% endif %}>10</option>
        <option value="20" {% if size == 20 %}selected{% endif %}>20</option>
        <option value="50" {% if size == 50 %}selected{% endif %}>50</option>
      </select>
    </div>
  </form>
</section>
