volumes:
  pg_ems:

services:

  postgres:
    image: postgres:17.1-alpine3.20
    container_name: ems-postgres
    env_file: .env
    volumes:
      - pg_ems:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 10s
      retries: 5
    restart: unless-stopped